kind = "mobile"
previewPath = "/"
title = "PDF Editor & Converter"
version = "1.0.0"
id = "artifacts/pdf-editor"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25014

[services.development]
run = "pnpm --filter @workspace/pdf-editor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pdf-editor", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/pdf-editor", "run", "serve" ]

[services.env]
PORT = "25014"
BASE_PATH = "/"
